name: Deploy Charitap to Vercel

on:
  push:
    branches:
      - chrome-extension
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  VERCEL_ORG_ID: team_38k2qcbJtdC1wmflmMocnQUr

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Deploy Backend API
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    outputs:
      backend-url: ${{ steps.deploy.outputs.backend-url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (Backend)
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

      - name: Build Backend (Vercel)
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

      - name: Deploy Backend to Vercel
        id: deploy
        run: |
          set -euo pipefail
          STDERR_LOG=$(mktemp)
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} 2>"$STDERR_LOG") || {
            echo "❌ Backend deployment failed!"
            echo "stderr output:"
            cat "$STDERR_LOG"
            rm -f "$STDERR_LOG"
            exit 1
          }
          rm -f "$STDERR_LOG"
          echo "backend-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Backend deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

  # ─────────────────────────────────────────────
  # Job 2: Deploy Frontend
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    outputs:
      frontend-url: ${{ steps.deploy.outputs.frontend-url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (Frontend)
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

      - name: Build Frontend (Vercel)
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

      - name: Deploy Frontend to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "frontend-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Frontend deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

  # ─────────────────────────────────────────────
  # Job 3: Deployment Summary
  # ─────────────────────────────────────────────
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Print Deployment URLs
        run: |
          echo "============================================"
          echo "🚀 CHARITAP DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "🔧 Backend API : ${{ needs.deploy-backend.outputs.backend-url }}"
          echo "🌐 Frontend    : ${{ needs.deploy-frontend.outputs.frontend-url }}"
          echo "============================================"
